name: remerciements
description: "Diapositive de clôture : message de remerciement, appel aux questions, code QR"
fields:
  content:
    required: []
    optional:
      - name: message
        description: "Texte affiché en haut de la diapositive"
        type: string
      - name: focus
        description: "Mot ou phrase centrale, affiché en très grand"
        type: string
      - name: qr-url
        description: "URL encodée dans le code QR (affiché en bas à droite)"
        type: string
      - name: qr-label
        description: "Texte sous le code QR (défaut : la valeur de qr-url)"
        type: string
      - name: qr-image
        description: "Chemin vers une image de QR code pré-générée (ex. via `dev.sh qrcode`) ; prioritaire sur qr-url si présent, pour réutiliser exactement le même QR que sur la slide de titre"
        type: path
  params:
    optional: []
notes: >
  Le code QR est affiché en bas à droite, hauteur 1/5 de la hauteur totale (1.9cm).
  Si qr-image est présent, il est utilisé tel quel (image) au lieu de générer le
  QR nativement depuis qr-url. Si qr-label est absent, l'URL est affichée telle
  quelle sous le code QR. Le champ focus apparaît en NoumanityOrange pour
  maximiser l'impact visuel.
example: |
  ---
  diapo:
    model: remerciements
  content:
    message: "Merci de votre attention"
    focus: "Questions?"
    qr-url: "https://example.com/repo"
  ---
